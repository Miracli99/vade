name: Build Web And Android

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  web-and-container:
    name: Web export and container
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Export web bundle
        run: npm run export:web

      - name: Upload web artifact
        uses: actions/upload-artifact@v6
        with:
          name: web-dist
          path: dist
          if-no-files-found: error

      - name: Compute container image name
        id: image
        shell: bash
        run: |
          IMAGE_NAME="ghcr.io/${GITHUB_REPOSITORY,,}"
          echo "name=$IMAGE_NAME" >> "$GITHUB_OUTPUT"

      - name: Build Docker image
        run: docker build -t ${{ steps.image.outputs.name }}:${{ github.sha }} .

      - name: Export Docker image archive
        run: docker save ${{ steps.image.outputs.name }}:${{ github.sha }} | gzip > vade-retro-web-${{ github.sha }}.tar.gz

      - name: Upload Docker artifact
        uses: actions/upload-artifact@v6
        with:
          name: docker-image
          path: vade-retro-web-${{ github.sha }}.tar.gz
          if-no-files-found: error

      - name: Login to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push container image tags
        if: github.event_name != 'pull_request'
        shell: bash
        run: |
          docker tag ${{ steps.image.outputs.name }}:${{ github.sha }} ${{ steps.image.outputs.name }}:sha-${{ github.sha }}
          docker push ${{ steps.image.outputs.name }}:sha-${{ github.sha }}

          if [ "${{ github.ref }}" = "refs/heads/main" ] || [ "${{ github.ref }}" = "refs/heads/master" ]; then
            docker tag ${{ steps.image.outputs.name }}:${{ github.sha }} ${{ steps.image.outputs.name }}:latest
            docker push ${{ steps.image.outputs.name }}:latest
          fi

  android-apk:
    name: Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Generate Android project
        run: npx expo prebuild --platform android --non-interactive

      - name: Make Gradle wrapper executable
        working-directory: android
        run: chmod +x gradlew

      - name: Build release APK
        working-directory: android
        run: ./gradlew assembleRelease

      - name: List APK outputs
        if: always()
        working-directory: android
        run: find app/build/outputs -type f | sort

      - name: Upload APK artifact
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: android-apk
          path: android/app/build/outputs/apk/release/*.apk
          if-no-files-found: error

      - name: Compute release metadata
        if: success() && (github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
        id: release_meta
        shell: bash
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          TAG_NAME="apk-${SHORT_SHA}"
          RELEASE_NAME="Android APK ${SHORT_SHA}"
          echo "tag=$TAG_NAME" >> "$GITHUB_OUTPUT"
          echo "name=$RELEASE_NAME" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        if: success() && (github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_meta.outputs.tag }}
          name: ${{ steps.release_meta.outputs.name }}
          generate_release_notes: true
          files: android/app/build/outputs/apk/release/*.apk
